<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pantry Checkout</title>
<style>
  :root {
    --navy: #1B3A5C;
    --navy-dark: #122740;
    --teal: #2E8B8B;
    --teal-light: #E8F5F5;
    --green: #2E7D32;
    --green-light: #E8F5E9;
    --amber: #F57F17;
    --red: #C62828;
    --gray-50: #F7F8FA;
    --gray-100: #ECEEF2;
    --gray-200: #D8DCE4;
    --gray-400: #8A93A5;
    --gray-700: #3F4756;
    --shadow-sm: 0 1px 2px rgba(18, 39, 64, 0.08);
    --shadow-md: 0 4px 12px rgba(18, 39, 64, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--gray-50);
    color: var(--gray-700);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }

  /* ============================================================
     LOGIN SCREEN
     ============================================================ */
  .login-shell {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: linear-gradient(180deg, var(--navy) 0%, var(--navy-dark) 100%);
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .login-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--navy);
    margin: 0 0 4px;
    text-align: center;
  }
  .login-sub {
    text-align: center;
    color: var(--gray-400);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .login-field { margin-bottom: 14px; }
  .login-label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--gray-700);
    margin-bottom: 5px;
  }
  .login-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--navy);
    background: white;
    transition: border-color 0.15s;
    min-height: 48px;
  }
  .login-input:focus {
    outline: none;
    border-color: var(--teal);
  }
  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    min-height: 50px;
    transition: background 0.15s;
  }
  .login-btn:active { background: var(--navy-dark); }
  .login-btn:disabled {
    background: var(--gray-400);
    cursor: not-allowed;
  }
  .login-error {
    background: #FEEBEE;
    color: var(--red);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 0.88rem;
    margin-bottom: 14px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ============================================================
     APP SHELL (hidden until logged in)
     ============================================================ */
  .app-shell { display: none; }
  .app-shell.show { display: block; }

  header {
    background: var(--navy);
    color: white;
    padding: 12px 18px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: var(--shadow-md);
  }
  .header-row {
    display: flex; align-items: center; gap: 12px;
    max-width: 1400px; margin: 0 auto;
    flex-wrap: wrap;
  }
  .header-title-block { flex-shrink: 0; }
  .header-title { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.2px; }

  /* Served counter + clock block. Grows to fill space between
     title and the action buttons. On narrow viewports it wraps
     to a new row below the title. */
  .header-stats {
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex: 1 1 auto;
    justify-content: center;
    min-width: 0;
  }
  .served-block {
    display: flex;
    align-items: baseline;
    gap: 8px;
    line-height: 1;
  }
  .served-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
  }
  .served-value {
    font-size: 1.85rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .served-slash {
    font-size: 1.5rem;
    font-weight: 400;
    opacity: 0.5;
    margin: 0 2px;
  }
  .clock-block {
    font-size: 1.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
    opacity: 0.92;
  }
  @media (max-width: 720px) {
    .header-stats {
      order: 99;             /* wraps below the title row */
      width: 100%;
      justify-content: flex-start;
      padding-top: 4px;
      gap: 14px;
    }
    .served-value { font-size: 1.6rem; }
    .clock-block { font-size: 1.25rem; }
  }
  @media (max-width: 380px) {
    .served-value { font-size: 1.35rem; }
    .clock-block { font-size: 1.1rem; }
    .served-label { font-size: 0.7rem; letter-spacing: 0.5px; }
  }

  .header-date-row {
    display: flex; align-items: center; gap: 6px;
    margin-top: 2px;
  }
  .header-date-input {
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: inherit;
    cursor: pointer;
    color-scheme: dark;
    min-height: 28px;
  }
  .header-date-input::-webkit-calendar-picker-indicator {
    filter: invert(1);
    opacity: 0.8;
    cursor: pointer;
  }
  .header-today-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 6px;
    cursor: pointer;
    min-height: 28px;
    transition: background 0.15s;
  }
  .header-today-btn:active { background: rgba(255,255,255,0.2); }
  .header-today-btn.hidden { display: none; }
  .header-spacer { flex: 1; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  .status-pill.history { background: rgba(245, 127, 23, 0.25); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ADE80;
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6);
  }
  .status-pill.history .status-dot { background: #FBBF24; }
  .status-dot.polling { animation: pulse 1.2s ease-out; }
  .status-dot.error { background: #F87171; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.55); }
    100% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
  }

  .refresh-btn {
    background: rgba(255,255,255,0.14);
    border: none; color: white;
    width: 104px; height: 52px;
    border-radius: 10px;
    font-size: 1.1rem;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .refresh-btn:active { background: rgba(255,255,255,0.28); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Discreet sign-out link at the bottom of the page */
  .footer-signout {
    text-align: center;
    padding: 20px 16px 32px;
    color: var(--gray-400);
    font-size: 0.85rem;
  }
  .footer-signout-btn {
    background: none;
    border: none;
    color: var(--gray-400);
    font-size: 0.85rem;
    font-family: inherit;
    text-decoration: underline;
    cursor: pointer;
    padding: 8px 12px;
    min-height: 36px;
  }
  .footer-signout-btn:active { color: var(--gray-700); }

  /* ============================================================
     Tabs + Sort row
     ============================================================ */
  .controls {
    background: white;
    border-bottom: 1px solid var(--gray-200);
    padding: 10px 16px;
    position: sticky; top: 64px; z-index: 9;
  }
  .controls-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap;
  }

  .tabs {
    display: inline-flex;
    background: var(--gray-100);
    border-radius: 10px;
    padding: 3px;
  }
  .tab {
    background: transparent;
    border: none;
    padding: 9px 16px;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--gray-700);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
    min-height: 38px;
  }
  .tab.active {
    background: white;
    color: var(--navy);
    box-shadow: var(--shadow-sm);
  }
  .tab-count {
    display: inline-flex;
    align-items: center; justify-content: center;
    min-width: 22px; height: 22px;
    padding: 0 7px;
    border-radius: 11px;
    background: var(--gray-200);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--gray-700);
  }
  .tab.active .tab-count { background: var(--teal-light); color: var(--teal); }

  .sort-row {
    display: inline-flex; align-items: center; gap: 8px;
    margin-left: auto;
    font-size: 0.85rem;
  }
  .sort-label { color: var(--gray-400); font-weight: 500; }
  .sort-select {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 8px 28px 8px 11px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    min-height: 38px;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%231B3A5C' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }

  /* ============================================================
     Card grid
     ============================================================ */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 14px 16px 80px;
  }

  .grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(2, 1fr);
  }
  @media (max-width: 540px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s, background 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 96px;
  }
  .card:active {
    transform: scale(0.985);
    box-shadow: var(--shadow-sm);
  }
  .card.complete {
    background: var(--green-light);
    border-color: #B5DDB7;
  }
  .card.just-changed {
    animation: flash 1.1s ease-out;
  }
  @keyframes flash {
    0%   { background-color: #FFF7C2; border-color: var(--amber); }
    100% {}
  }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 1.08rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card.complete .card-name { color: var(--green); }
  .card-meta {
    font-size: 0.82rem;
    color: var(--gray-400);
    margin-top: 4px;
  }

  /* Prominent household-size badge, ~2 text lines tall */
  .card-hh {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 14px;
    background: var(--teal-light);
    color: var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.1rem;
    font-weight: 800;
    line-height: 1;
    transition: background 0.2s, color 0.2s;
  }
  .card.complete .card-hh {
    background: white;
    color: var(--green);
  }

  .card-check {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--gray-200);
    background: white;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .card.complete .card-check {
    background: var(--green);
    border-color: var(--green);
  }
  .card-check svg {
    width: 18px; height: 18px;
    stroke: var(--gray-200);
    stroke-width: 3.5;
    fill: none;
    stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.15s;
  }
  .card.complete .card-check svg { stroke: white; }

  /* ============================================================
     Empty / loading / error states
     ============================================================ */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-400);
  }
  .state-msg-icon {
    font-size: 2.6rem;
    margin-bottom: 10px;
    opacity: 0.6;
  }
  .state-msg-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--gray-700);
    margin-bottom: 4px;
  }
  .state-msg-detail { font-size: 0.88rem; }

  /* ============================================================
     Confirm modal
     ============================================================ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(18, 39, 64, 0.5);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  .modal-backdrop.show {
    opacity: 1; pointer-events: auto;
  }
  .modal {
    background: white;
    border-radius: 14px;
    max-width: 360px; width: 100%;
    padding: 22px;
    box-shadow: 0 12px 40px rgba(18, 39, 64, 0.3);
    transform: translateY(8px);
    transition: transform 0.18s;
  }
  .modal-backdrop.show .modal { transform: translateY(0); }
  .modal-title {
    font-size: 1.1rem; font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .modal-body { font-size: 0.95rem; margin-bottom: 18px; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 9px;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    min-height: 46px;
  }
  .modal-btn-cancel { background: var(--gray-100); color: var(--gray-700); }
  .modal-btn-confirm { background: var(--navy); color: white; }
  .modal-btn-danger { background: var(--red); color: white; }

  /* ============================================================
     Toast
     ============================================================ */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--navy-dark);
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    box-shadow: var(--shadow-md);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
    max-width: 90%;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { background: var(--red); }
</style>
</head>
<body>

<!-- ============================================================
     LOGIN SHELL
     ============================================================ -->
<div class="login-shell" id="login-shell">
  <div class="login-card">
    <h1 class="login-title">Pantry Checkout</h1>
    <div class="login-sub">Sign in to continue</div>
    <div class="login-error" id="login-error"></div>
    <div class="login-field">
      <label class="login-label" for="login-username">Username</label>
      <input type="text" id="login-username" class="login-input"
             autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="login-field">
      <label class="login-label" for="login-password">Password</label>
      <input type="password" id="login-password" class="login-input"
             autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Sign in</button>
  </div>
</div>

<!-- ============================================================
     APP SHELL
     ============================================================ -->
<div class="app-shell" id="app-shell">

<header>
  <div class="header-row">
    <div class="header-title-block">
      <div class="header-title">Pantry Checkout</div>
      <div class="header-date-row">
        <input type="date" class="header-date-input" id="header-date-input">
        <button class="header-today-btn hidden" id="header-today-btn">Today</button>
      </div>
    </div>

    <div class="header-stats">
      <div class="served-block">
        <span class="served-label">Served</span>
        <span class="served-value" id="served-households">0</span>
        <span class="served-slash">/</span>
        <span class="served-value" id="served-people">0</span>
      </div>
      <div class="clock-block" id="clock">--:--</div>
    </div>

    <div class="header-spacer"></div>
    <div class="status-pill" id="status-pill">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Live</span>
    </div>
    <button class="refresh-btn" id="refresh-btn" aria-label="Refresh now">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
        <path d="M3 21v-5h5"/>
      </svg>
    </button>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="remaining">
        Remaining <span class="tab-count" id="count-remaining">0</span>
      </button>
      <button class="tab" data-tab="complete">
        Complete <span class="tab-count" id="count-complete">0</span>
      </button>
      <button class="tab" data-tab="all">
        Show All <span class="tab-count" id="count-all">0</span>
      </button>
    </div>
    <div class="sort-row">
      <span class="sort-label">Sort:</span>
      <select class="sort-select" id="sort-select">
        <option value="timestamp">Check-in time</option>
        <option value="firstName">First name</option>
        <option value="lastName">Last name</option>
      </select>
    </div>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="state-msg" id="empty-state" style="display:none;">
    <div class="state-msg-icon" id="empty-icon">📋</div>
    <div class="state-msg-title" id="empty-title">No patrons yet</div>
    <div class="state-msg-detail" id="empty-detail">New intake submissions will appear here automatically.</div>
  </div>
</main>

<div class="footer-signout">
  <button class="footer-signout-btn" id="signout-btn">Sign out</button>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-btn modal-btn-confirm" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

</div> <!-- /.app-shell -->

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const APPS_SCRIPT_URL = '';   // Set to your intake form's Apps Script URL
  const POLL_INTERVAL_MS = 10000;
  const TOKEN_STORAGE_KEY = 'pantry_checkout_token';
  const TOKEN_EXPIRY_KEY = 'pantry_checkout_token_expires';

  // ============================================================
  // STATE
  // ============================================================
  let rows = [];
  let activeTab = 'remaining';
  let sortBy = 'timestamp';
  let selectedDate = todayDateKey();
  let pollTimer = null;
  let inflightCheckout = new Set();
  let lastChangedRowId = null;
  let lastChangedAt = 0;
  let pendingAction = null;
  let authToken = null;

  // ============================================================
  // DATE HELPERS
  // ============================================================
  function todayDateKey() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}${m}${day}`;
  }
  function dateKeyToInputValue(key) {
    if (!/^\d{8}$/.test(key)) return '';
    return `${key.substring(0,4)}-${key.substring(4,6)}-${key.substring(6,8)}`;
  }
  function inputValueToDateKey(val) {
    if (!val) return todayDateKey();
    return val.replace(/-/g, '');
  }
  function isViewingToday() {
    return selectedDate === todayDateKey();
  }

  // Clock updates every 15 seconds (HH:MM only - no need for second-level tick).
  function startClock() {
    function tick() {
      const d = new Date();
      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const el = document.getElementById('clock');
      if (el) el.textContent = `${h}:${m} ${ampm}`;
    }
    tick();
    setInterval(tick, 15000);
  }

  // ============================================================
  // BOOT
  // ============================================================
  document.addEventListener('DOMContentLoaded', () => {
    startClock();

    if (!APPS_SCRIPT_URL) {
      showLoginError('APPS_SCRIPT_URL is not configured in checkout.html. Edit the file and add your deployed Apps Script URL.');
      document.getElementById('login-btn').disabled = true;
      return;
    }

    // Try to restore an existing session.
    const stored = loadStoredToken();
    if (stored) {
      authToken = stored;
      enterApp();
    } else {
      showLogin();
    }

    wireLogin();
    wireDatePicker();
    wireTabs();
    wireSort();
    wireRefresh();
    wireSignout();
    wireModal();
  });

  // ============================================================
  // LOGIN / TOKEN
  // ============================================================
  function loadStoredToken() {
    try {
      const token = localStorage.getItem(TOKEN_STORAGE_KEY);
      const expires = Number(localStorage.getItem(TOKEN_EXPIRY_KEY) || 0);
      if (!token || !expires) return null;
      if (Date.now() > expires) {
        clearStoredToken();
        return null;
      }
      return token;
    } catch (e) {
      return null;
    }
  }
  function saveStoredToken(token, expiresAt) {
    try {
      localStorage.setItem(TOKEN_STORAGE_KEY, token);
      localStorage.setItem(TOKEN_EXPIRY_KEY, String(expiresAt));
    } catch (e) {}
  }
  function clearStoredToken() {
    try {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
      localStorage.removeItem(TOKEN_EXPIRY_KEY);
    } catch (e) {}
  }

  function wireLogin() {
    const btn = document.getElementById('login-btn');
    const user = document.getElementById('login-username');
    const pass = document.getElementById('login-password');

    btn.addEventListener('click', doLogin);
    // Enter key submits.
    [user, pass].forEach(el => {
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
      });
    });
  }

  async function doLogin() {
    const user = document.getElementById('login-username').value.trim();
    const pass = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');

    if (!user || !pass) {
      showLoginError('Enter a username and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    hideLoginError();

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow',
        body: JSON.stringify({ action: 'login', username: user, password: pass })
      });
      const data = await res.json();
      if (data && data.ok && data.token) {
        authToken = data.token;
        saveStoredToken(data.token, data.expiresAt);
        document.getElementById('login-password').value = '';
        enterApp();
      } else {
        showLoginError((data && data.error) || 'Could not sign in.');
      }
    } catch (err) {
      showLoginError('Network error. Check your connection and try again.');
      console.warn('Login failed:', err);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  function showLoginError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideLoginError() {
    document.getElementById('login-error').classList.remove('show');
  }

  function showLogin() {
    document.getElementById('login-shell').style.display = 'flex';
    document.getElementById('app-shell').classList.remove('show');
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    setTimeout(() => {
      document.getElementById('login-username').focus();
    }, 50);
  }

  function enterApp() {
    document.getElementById('login-shell').style.display = 'none';
    document.getElementById('app-shell').classList.add('show');
    poll();
    startPolling();
  }

  function wireSignout() {
    document.getElementById('signout-btn').addEventListener('click', async () => {
      const token = authToken;
      authToken = null;
      clearStoredToken();
      rows = [];
      showLogin();
      // Fire-and-forget logout call so the server can invalidate the token.
      if (token) {
        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            redirect: 'follow',
            body: JSON.stringify({ action: 'logout', token: token })
          });
        } catch (e) { /* don't care */ }
      }
    });
  }

  // Auth failure from any API call - kick back to login.
  function handleAuthFailure(message) {
    authToken = null;
    clearStoredToken();
    showLoginError(message || 'Session expired. Please sign in again.');
    showLogin();
  }

  // ============================================================
  // DATE PICKER
  // ============================================================
  function wireDatePicker() {
    const input = document.getElementById('header-date-input');
    input.value = dateKeyToInputValue(selectedDate);
    input.max = dateKeyToInputValue(todayDateKey());
    input.addEventListener('change', () => {
      const newKey = inputValueToDateKey(input.value);
      if (newKey === selectedDate) return;
      selectedDate = newKey;
      onSelectedDateChanged();
    });

    document.getElementById('header-today-btn').addEventListener('click', () => {
      if (isViewingToday()) return;
      selectedDate = todayDateKey();
      input.value = dateKeyToInputValue(selectedDate);
      onSelectedDateChanged();
    });

    updateDateUI();
  }

  function onSelectedDateChanged() {
    rows = [];
    render();
    updateDateUI();
    poll();
  }

  function updateDateUI() {
    const todayBtn = document.getElementById('header-today-btn');
    const statusPill = document.getElementById('status-pill');
    const statusText = document.getElementById('status-text');
    const todayMode = isViewingToday();
    todayBtn.classList.toggle('hidden', todayMode);
    statusPill.classList.toggle('history', !todayMode);
    statusText.textContent = todayMode ? 'Live' : 'Past day';
  }

  // ============================================================
  // POLLING
  // ============================================================
  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(poll, POLL_INTERVAL_MS);
  }

  async function poll() {
    if (!authToken) return;

    const dot = document.getElementById('status-dot');
    dot.classList.remove('error');
    dot.classList.remove('polling');
    void dot.offsetWidth;
    dot.classList.add('polling');

    const requestedDate = selectedDate;
    const requestedToken = authToken;

    try {
      const url = `${APPS_SCRIPT_URL}?action=list&date=${requestedDate}&token=${encodeURIComponent(requestedToken)}&t=${Date.now()}`;
      const res = await fetch(url, { method: 'GET', redirect: 'follow' });
      const data = await res.json();

      if (data && data.authRequired) {
        handleAuthFailure(data.error);
        return;
      }

      if (data && data.ok && Array.isArray(data.rows)) {
        if (requestedDate !== selectedDate) return;
        rows = data.rows;
        render();
        setStatus(isViewingToday() ? 'Live' : 'Past day');
      } else {
        throw new Error(data && data.error ? data.error : 'Bad response');
      }
    } catch (err) {
      dot.classList.add('error');
      setStatus('Reconnecting...');
      console.warn('Poll failed:', err);
    }
  }

  function setStatus(text) {
    document.getElementById('status-text').textContent = text;
  }

  // ============================================================
  // RENDER
  // ============================================================
  function render() {
    const completeRows = rows.filter(r => !!r.checkedOutAt);
    const completeCount = completeRows.length;
    const remainingCount = rows.length - completeCount;

    // Served counter: households completed / total people in those households.
    const servedPeople = completeRows.reduce(
      (sum, r) => sum + (Number(r.householdSize) || 0), 0
    );
    document.getElementById('served-households').textContent = completeCount;
    document.getElementById('served-people').textContent = servedPeople;

    document.getElementById('count-all').textContent = rows.length;
    document.getElementById('count-complete').textContent = completeCount;
    document.getElementById('count-remaining').textContent = remainingCount;

    let view = rows.slice();
    if (activeTab === 'remaining') view = view.filter(r => !r.checkedOutAt);
    else if (activeTab === 'complete') view = view.filter(r => !!r.checkedOutAt);

    view.sort(compareRows);

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty-state');

    if (view.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      const { icon, title, detail } = emptyStateFor(activeTab, rows.length);
      document.getElementById('empty-icon').textContent = icon;
      document.getElementById('empty-title').textContent = title;
      document.getElementById('empty-detail').textContent = detail;
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = view.map(r => renderCard(r)).join('');

    Array.from(grid.querySelectorAll('.card')).forEach(el => {
      el.addEventListener('click', () => onCardTap(el.dataset.rowId));
    });
  }

  function renderCard(r) {
    const complete = !!r.checkedOutAt;
    const flash = (r.rowId === lastChangedRowId && Date.now() - lastChangedAt < 1500)
      ? ' just-changed' : '';
    const name = escapeHtml(`${r.firstName} ${r.lastName}`.trim() || '(no name)');
    const hh = Number(r.householdSize) || 0;
    const meta = complete && r.checkedOutAt
      ? `Checked out ${formatTime(r.checkedOutAt)}`
      : `Submitted ${formatTime(r.timestamp)}`;
    return `
      <div class="card${complete ? ' complete' : ''}${flash}" data-row-id="${escapeHtml(r.rowId)}">
        <div class="card-info">
          <div class="card-name">${name}</div>
          <div class="card-meta">${meta}</div>
        </div>
        <div class="card-hh" aria-label="Household size ${hh}">${hh}</div>
        <div class="card-check" aria-hidden="true">
          <svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 8"/></svg>
        </div>
      </div>
    `;
  }

  function emptyStateFor(tab, totalRows) {
    const todayMode = isViewingToday();
    if (totalRows === 0) {
      if (!todayMode) {
        return {
          icon: '📅',
          title: 'No patrons on this date',
          detail: 'No intake submissions were recorded for the selected day.'
        };
      }
      return {
        icon: '📋',
        title: 'No patrons yet',
        detail: 'New intake submissions will appear here automatically.'
      };
    }
    if (tab === 'remaining') {
      return {
        icon: '✓',
        title: 'All checked out',
        detail: todayMode
          ? 'Everyone who has registered today has been served.'
          : 'Everyone who registered that day was checked out.'
      };
    }
    if (tab === 'complete') {
      return {
        icon: '⏳',
        title: 'No one checked out',
        detail: todayMode
          ? 'Tap a card on the Remaining tab to mark someone complete.'
          : 'No checkouts were recorded for the selected day.'
      };
    }
    return { icon: '📋', title: 'Nothing here', detail: '' };
  }

  // ============================================================
  // SORTING
  // ============================================================
  function compareRows(a, b) {
    if (sortBy === 'firstName') {
      return cmp(a.firstName, b.firstName) || cmp(a.lastName, b.lastName);
    }
    if (sortBy === 'lastName') {
      return cmp(a.lastName, b.lastName) || cmp(a.firstName, b.firstName);
    }
    if (activeTab === 'complete') {
      return cmp(b.checkedOutAt, a.checkedOutAt);
    }
    return cmp(a.timestamp, b.timestamp);
  }
  function cmp(a, b) {
    a = (a || '').toString().toLowerCase();
    b = (b || '').toString().toLowerCase();
    if (a < b) return -1;
    if (a > b) return 1;
    return 0;
  }

  // ============================================================
  // INTERACTION
  // ============================================================
  function wireTabs() {
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        render();
      });
    });
  }

  function wireSort() {
    document.getElementById('sort-select').addEventListener('change', (e) => {
      sortBy = e.target.value;
      render();
    });
  }

  function wireRefresh() {
    const btn = document.getElementById('refresh-btn');
    btn.addEventListener('click', async () => {
      btn.classList.add('spinning');
      await poll();
      setTimeout(() => btn.classList.remove('spinning'), 400);
    });
  }

  function wireModal() {
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'modal-backdrop') closeModal();
    });
    document.getElementById('modal-confirm').addEventListener('click', () => {
      if (pendingAction) performCheckout(pendingAction.rowId, pendingAction.currentlyComplete);
      closeModal();
    });
  }

  function onCardTap(rowId) {
    if (inflightCheckout.has(rowId)) return;
    const row = rows.find(r => r.rowId === rowId);
    if (!row) return;

    const currentlyComplete = !!row.checkedOutAt;
    if (currentlyComplete) {
      pendingAction = { rowId, currentlyComplete };
      openModal({
        title: 'Mark as not checked out?',
        body: `This will move ${row.firstName} ${row.lastName} back to Remaining.`,
        confirmText: 'Undo checkout',
        danger: true
      });
    } else {
      performCheckout(rowId, currentlyComplete);
    }
  }

  async function performCheckout(rowId, currentlyComplete) {
    inflightCheckout.add(rowId);

    const row = rows.find(r => r.rowId === rowId);
    const originalCheckedOutAt = row ? row.checkedOutAt : '';
    if (row) {
      row.checkedOutAt = currentlyComplete ? '' : new Date().toISOString();
    }
    lastChangedRowId = rowId;
    lastChangedAt = Date.now();
    render();

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow',
        body: JSON.stringify({
          action: currentlyComplete ? 'uncheckout' : 'checkout',
          rowId: rowId,
          token: authToken
        })
      });
      const data = await res.json();

      if (data && data.authRequired) {
        // Roll back optimistic change before bouncing to login.
        if (row) row.checkedOutAt = originalCheckedOutAt;
        render();
        handleAuthFailure(data.error);
        return;
      }

      if (!data || !data.ok) {
        throw new Error(data && data.error ? data.error : 'Server rejected the update');
      }
      if (row) row.checkedOutAt = data.checkedOutAt || '';
      render();
    } catch (err) {
      if (row) row.checkedOutAt = originalCheckedOutAt;
      render();
      showToast(`Could not update - ${err.message}. Try again.`, true);
      console.warn('Checkout failed:', err);
    } finally {
      inflightCheckout.delete(rowId);
    }
  }

  function openModal({ title, body, confirmText, danger }) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent = body;
    const confirmBtn = document.getElementById('modal-confirm');
    confirmBtn.textContent = confirmText || 'Confirm';
    confirmBtn.classList.toggle('modal-btn-danger', !!danger);
    confirmBtn.classList.toggle('modal-btn-confirm', !danger);
    document.getElementById('modal-backdrop').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('show');
    pendingAction = null;
  }

  // ============================================================
  // UTILITIES
  // ============================================================
  function formatTime(isoOrString) {
    if (!isoOrString) return '';
    const d = new Date(isoOrString);
    if (isNaN(d.getTime())) return '';
    let h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m} ${ampm}`;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  let toastTimer = null;
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('error', !!isError);
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>

</body>
